<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>质感增强-加速工作流效果对比</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="./effect-showcase-manifest.js"></script>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #172026;
      --muted: #66717d;
      --line: #e8edf3;
      --line-strong: #d8e0ea;
      --brand: #2563eb;
      --brand-weak: #eaf1ff;
      --shadow: 0 16px 42px rgba(20, 31, 45, .13);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
      letter-spacing: 0;
      overflow: hidden;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; border: 0; }

    .topbar {
      position: sticky;
      top: 0;
      flex: 0 0 auto;
      z-index: 30;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 24px;
      background: rgba(255, 255, 255, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      color: #fff;
      background: #111827;
      border-radius: var(--radius);
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: none;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search {
      width: 260px;
      height: 38px;
      padding: 0 11px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      outline: none;
    }

    .search:focus {
      border-color: #8fb4ff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .08);
    }

    .select {
      height: 38px;
      padding: 0 10px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
    }

    .count-pill {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      color: var(--muted);
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn, .icon-btn, .seg button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 13px;
      border-radius: var(--radius);
      font-weight: 800;
      white-space: nowrap;
    }

    .btn-plain {
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line-strong);
    }

    .btn-soft {
      color: #174ea6;
      background: var(--brand-weak);
    }

    .icon-btn {
      width: 38px;
      padding: 0;
      border: 1px solid var(--line-strong);
      background: #fff;
    }

    .shell {
      width: min(1580px, 100%);
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 0 auto;
      padding: 12px 24px 20px;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .filterbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 38px;
      padding: 0 8px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .filter-chip {
      min-height: 32px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 900;
    }

    .filter-chip.active {
      color: #174ea6;
      background: var(--brand-weak);
      border-color: #9bbcff;
    }

    .brief {
      margin-bottom: 16px;
      padding: 18px 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 24px rgba(20, 31, 45, .06);
    }

    .brief h2 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.24;
    }

    .brief p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .version-notes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .version-note {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfe;
      line-height: 1.55;
      font-size: 13px;
    }

    .version-note strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-size: 13px;
    }

    .showcase-table {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      max-height: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .pager {
      display: none;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .pager button {
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }

    .pager button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .table-grid {
      display: grid;
      grid-template-columns: 56px repeat(3, minmax(230px, 1fr));
      min-width: 920px;
    }

    .th {
      position: sticky;
      top: 0;
      z-index: 12;
      min-height: 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-weight: 900;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .th-index {
      justify-content: center;
      text-align: center;
      white-space: nowrap;
    }

    .td {
      min-height: 0;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: #fff;
    }

    .index-cell {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: #1d4ed8;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      height: auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #e5e7eb;
    }

    .thumb img, .stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-actions {
      position: absolute;
      right: 8px;
      bottom: 8px;
      display: flex;
      gap: 8px;
    }

    .thumb-actions button {
      height: 32px;
      min-width: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 9px;
      color: #fff;
      background: rgba(15, 23, 42, .74);
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .image-label {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
      grid-column: 1 / -1;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      background: rgba(8, 13, 20, .72);
    }

    .modal.open {
      display: grid;
      place-items: center;
    }

    .modal-panel {
      width: min(1320px, calc(100vw - 36px));
      height: min(840px, calc(100vh - 36px));
      display: grid;
      grid-template-rows: 58px minmax(0, 1fr);
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 26px 80px rgba(0, 0, 0, .34);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 0 14px 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .modal-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .seg {
      display: inline-flex;
      padding: 3px;
      background: #edf2f7;
      border-radius: var(--radius);
    }

    .seg button {
      min-height: 32px;
      color: var(--muted);
      background: transparent;
      padding: 0 10px;
    }

    .seg button.active {
      color: var(--ink);
      background: #fff;
      box-shadow: 0 1px 4px rgba(20, 31, 45, .1);
    }

    .stage-wrap {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      padding: 18px;
      background: #111827;
    }

    .stage {
      position: relative;
      width: min(100%, 1120px);
      height: min(100%, 720px);
      background: #0b1220;
      border: 1px solid rgba(255, 255, 255, .12);
      overflow: hidden;
      touch-action: none;
      --zoom-scale: 1;
      --zoom-x: 0px;
      --zoom-y: 0px;
    }

    .stage img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111827;
      transform: translate(var(--zoom-x), var(--zoom-y)) scale(var(--zoom-scale));
      transform-origin: 0 0;
      will-change: transform;
      user-select: none;
      pointer-events: none;
    }

    .stage::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: var(--split, 50%);
      width: 2px;
      background: rgba(255, 255, 255, .92);
      transform: translateX(-1px);
      pointer-events: none;
      z-index: 4;
    }

    .stage .before-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      overflow: hidden;
      clip-path: inset(0 calc(100% - var(--split, 50%)) 0 0);
      z-index: 2;
    }

    .stage .before-wrap img {
      width: 100%;
      height: 100%;
      max-width: none;
    }

    .handle {
      position: absolute;
      top: 50%;
      left: var(--split, 50%);
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      color: #fff;
      background: rgba(255, 255, 255, .44);
      border: 1px solid rgba(255, 255, 255, .75);
      border-radius: 999px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .18);
      z-index: 5;
    }

    .stage input[type="range"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      opacity: 0;
      cursor: ew-resize;
      z-index: 6;
    }

    .stage input[type="range"] {
      pointer-events: none;
    }

    .stage.zoomed {
      cursor: grab;
    }

    .stage.zoomed.dragging {
      cursor: grabbing;
    }

    .stage-badge {
      position: absolute;
      bottom: 16px;
      z-index: 5;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      color: #fff;
      background: rgba(17, 24, 39, .72);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 900;
      pointer-events: none;
    }

    .stage-badge.left { left: 16px; }
    .stage-badge.right { right: 16px; }

    @media (max-width: 980px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 12px 16px;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .search {
        width: min(100%, 280px);
      }

      .shell {
        padding: 16px;
      }

      .version-notes {
        grid-template-columns: 1fr;
      }

      .modal-head {
        align-items: flex-start;
        flex-direction: column;
        height: auto;
        padding: 12px;
      }

      .modal-panel {
        grid-template-rows: auto minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><i data-lucide="images" width="19" height="19"></i></div>
        <div>
          <h1>质感增强-加速工作流效果对比</h1>
          <p>批量测试flux2-9b-kv加速工作流的质感增强效果，并与线上工作流效果进行对比</p>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="filterbar" aria-label="分辨率筛选">
        <div class="filter-group" id="resolutionFilters">
          <span class="filter-label">分辨率筛选</span>
          <button class="filter-chip active" type="button" data-resolution="all">全部</button>
          <button class="filter-chip" type="button" data-resolution="1K">1K</button>
          <button class="filter-chip" type="button" data-resolution="2K">2K</button>
          <button class="filter-chip" type="button" data-resolution="4K">4K</button>
        </div>
        <span class="count-pill" id="countText">0 组</span>
      </section>
      <section class="showcase-table">
        <div class="pager" id="pager">
          <button id="prevPage" type="button">上一页</button>
          <span id="pageInfo">第 1 / 1 页</span>
          <button id="nextPage" type="button">下一页</button>
        </div>
        <div class="table-grid" id="table">
          <div class="th th-index">序号</div>
          <div class="th">原图</div>
          <div class="th">效果A（加速工作流）</div>
          <div class="th">效果B（线上工作流）</div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-head">
        <div class="modal-tools">
          <button class="icon-btn" id="fullscreenBtn" type="button" title="全屏"><i data-lucide="maximize-2" width="17" height="17"></i></button>
          <button class="icon-btn" id="closeModal" type="button" aria-label="关闭"><i data-lucide="x" width="18" height="18"></i></button>
        </div>
      </div>
      <div class="stage-wrap">
        <div class="stage" id="stage" style="--split: 50%;">
          <img id="stageAfter" alt="" />
          <div class="before-wrap"><img id="stageBefore" alt="" /></div>
          <div class="handle"><i data-lucide="chevrons-left-right" width="17" height="17"></i></div>
          <span class="stage-badge left" id="stageLeftBadge">原图</span>
          <span class="stage-badge right" id="stageRightBadge">效果B</span>
          <input id="stageRange" type="range" min="0" max="100" value="50" aria-label="对比滑杆" />
        </div>
      </div>
    </div>
  </div>

  <script>
    const MANIFEST_BASE = '';

    const VERSIONS = [
      {
        key: 'original',
        label: '原图',
        fields: ['original', 'originalUrl'],
        thumbFields: ['originalThumb', 'original', 'originalUrl'],
        nameFields: ['originalName']
      },
      {
        key: 'a',
        label: '效果A',
        fields: ['a'],
        thumbFields: ['aThumb', 'a'],
        nameFields: ['aName']
      },
      {
        key: 'b',
        label: '效果B',
        fields: ['b'],
        thumbFields: ['bThumb', 'b'],
        nameFields: ['bName']
      }
    ];

    const VERSION_LABELS = Object.fromEntries(VERSIONS.map(version => [version.key, version.label]));

    const $ = selector => document.querySelector(selector);
    const els = {
      table: $('#table'),
      countText: $('#countText'),
      resolutionFilters: $('#resolutionFilters'),
      pager: $('#pager'),
      prevPage: $('#prevPage'),
      nextPage: $('#nextPage'),
      pageInfo: $('#pageInfo'),
      modal: $('#modal'),
      fullscreenBtn: $('#fullscreenBtn'),
      closeModal: $('#closeModal'),
      stage: $('#stage'),
      stageBefore: $('#stageBefore'),
      stageAfter: $('#stageAfter'),
      stageLeftBadge: $('#stageLeftBadge'),
      stageRightBadge: $('#stageRightBadge'),
      stageRange: $('#stageRange')
    };

    const state = {
      rows: [],
      resolution: 'all',
      page: 1,
      pageSize: 9999,
      activeRowId: null,
      activePair: ['original', 'b'],
      zoom: {
        scale: 1,
        x: 0,
        y: 0,
        max: 8,
        dragging: false,
        splitDragging: false,
        dragStartX: 0,
        dragStartY: 0,
        startX: 0,
        startY: 0
      }
    };

    els.resolutionFilters.addEventListener('click', event => {
      const button = event.target.closest('[data-resolution]');
      if (!button) return;
      state.resolution = button.dataset.resolution;
      state.page = 1;
      els.resolutionFilters.querySelectorAll('[data-resolution]').forEach(item => {
        item.classList.toggle('active', item === button);
      });
      render();
    });

    els.prevPage.addEventListener('click', () => changePage(-1));
    els.nextPage.addEventListener('click', () => changePage(1));
    els.closeModal.addEventListener('click', closeModal);
    els.fullscreenBtn.addEventListener('click', () => document.querySelector('.modal-panel').requestFullscreen?.());
    els.stageRange.addEventListener('input', event => updateStageSplit(Number(event.target.value)));

    els.stage.addEventListener('wheel', handleStageWheel, { passive: false });
    els.stage.addEventListener('pointerdown', startStagePan);
    window.addEventListener('pointermove', moveStagePan);
    window.addEventListener('pointerup', endStagePan);
    window.addEventListener('pointercancel', endStagePan);

    els.modal.addEventListener('click', event => {
      if (event.target === els.modal) closeModal();
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && els.modal.classList.contains('open')) closeModal();
    });

    function loadRows() {
      const manifest = window.__IMAGE_MANIFEST__;
      const rows = Array.isArray(manifest) ? manifest : manifest?.rows;
      state.rows = (rows || [])
        .map((item, index) => normalizeRow(item, index))
        .sort((left, right) => left.order - right.order);
      render();
    }

    function normalizeRow(item, index) {
      const order = Number(item.order || item.id || index + 1) || index + 1;
      const row = {
        id: `row-${order}`,
        key: String(item.id || order),
        order,
        name: readableName(item.name, order),
        sceneTag: item.sceneTag || ''
      };

      VERSIONS.forEach(version => {
        const source = firstValue(item, version.fields);
        const thumb = firstValue(item, version.thumbFields) || source;
        const fileName = firstValue(item, version.nameFields) || fileNameFromUrl(source);
        row[version.key] = withBasePath(source);
        row[`${version.key}Thumb`] = withBasePath(thumb);
        row[`${version.key}Name`] = fileName;
        row[`${version.key}Meta`] = item[`${version.key}Meta`] || defaultMeta(version.key, item, fileName);
      });
      row.resolutionBucket = item.resolutionBucket || bucketFromSize(item.originalWidth, item.originalHeight);

      return row;
    }

    function defaultMeta(key, item, fileName) {
      if (key === 'original') {
        const width = item.originalWidth || item.width;
        const height = item.originalHeight || item.height;
        return width && height ? `原图尺寸：${width}*${height}px` : '原图尺寸：-';
      }
      const seconds = key === 'a' ? item.aSeconds : item.bSeconds;
      if (Number.isFinite(Number(seconds))) return `耗时：${Number(seconds).toFixed(2)}s`;
      return '耗时：-';
    }

    function bucketFromSize(width, height) {
      const longSide = Math.max(Number(width) || 0, Number(height) || 0);
      if (!longSide) return '';
      if (longSide <= 1024) return '1K';
      if (longSide <= 2048) return '2K';
      return '4K';
    }

    function readableName(name, order) {
      if (!name || /^\?\s*\d+\s*\?$/.test(String(name))) return `第 ${order} 组`;
      return String(name);
    }

    function firstValue(item, fields) {
      for (const field of fields) {
        if (item[field]) return item[field];
      }
      return '';
    }

    function withBasePath(path) {
      if (!path || path.startsWith('data:') || /^[a-z]+:\/\//i.test(path) || path.startsWith('./') || path.startsWith('../')) return path || '';
      return `${MANIFEST_BASE}${path}`;
    }

    function render() {
      els.table.querySelectorAll('.td, .empty').forEach(node => node.remove());
      const rows = filteredRows();
      const totalPages = getTotalPages(rows);
      state.page = Math.min(Math.max(state.page, 1), totalPages);

      if (!rows.length) {
        els.table.insertAdjacentHTML('beforeend', '<div class="empty">没有匹配的图片组。请检查搜索词或 manifest 配置。</div>');
      } else {
        const fragment = document.createDocumentFragment();
        const start = (state.page - 1) * state.pageSize;
        rows.slice(start, start + state.pageSize).forEach((row, visibleIndex) => appendRow(fragment, row, start + visibleIndex));
        els.table.appendChild(fragment);
      }

      updatePager(rows.length);
      els.countText.textContent = `${rows.length} / ${state.rows.length} 组`;
      lucide.createIcons();
    }

    function filteredRows() {
      if (state.resolution === 'all') return state.rows;
      return state.rows.filter(row => row.resolutionBucket === state.resolution);
    }

    function appendRow(fragment, row, index) {
      fragment.append(cell('td index-cell', String(index + 1)));
      VERSIONS.forEach(version => fragment.append(imageCell(row, version)));
    }

    function cell(className, text) {
      const div = document.createElement('div');
      div.className = className;
      div.textContent = text;
      return div;
    }

    function imageCell(row, version) {
      const div = document.createElement('div');
      div.className = 'td';
      const src = row[`${version.key}Thumb`] || row[version.key] || placeholder(version.label);
      const compareButtons = version.key === 'original'
        ? ''
        : version.key === 'a'
          ? '<button type="button" data-compare="original,a" title="原图 / 效果A"><i data-lucide="scan-line" width="15" height="15"></i>原图对比</button>'
          : '<button type="button" data-compare="original,b" title="原图 / 效果B"><i data-lucide="scan-line" width="15" height="15"></i>原图对比</button><button type="button" data-compare="a,b" title="效果A / 效果B"><i data-lucide="columns-2" width="15" height="15"></i>A/B对比</button>';

      div.innerHTML = `
        <div class="thumb">
          <img loading="lazy" src="${src}" alt="${escapeHtml(version.label)}" />
          <div class="thumb-actions">
            ${compareButtons}
          </div>
        </div>
        <div class="image-label">
          <span>${escapeHtml(row[`${version.key}Meta`] || version.label)}</span>
        </div>
      `;

      div.querySelector('img').addEventListener('error', event => {
        const img = event.currentTarget;
        if (!img.dataset.retry && src && !src.startsWith('data:')) {
          img.dataset.retry = '1';
          img.src = encodeURI(src);
          return;
        }
        img.src = placeholder(version.label);
      });

      div.querySelectorAll('[data-compare]').forEach(button => {
        button.addEventListener('click', () => openModal(row.id, button.dataset.compare.split(',')));
      });

      return div;
    }

    function openModal(rowId, pair = ['original', 'b']) {
      state.activeRowId = rowId;
      switchComparePair(pair[0], pair[1]);
      resetStageZoom();
      els.modal.classList.add('open');
      els.modal.setAttribute('aria-hidden', 'false');
    }

    function switchComparePair(leftKey, rightKey) {
      const row = findRow(state.activeRowId);
      if (!row) return;
      state.activePair = [leftKey, rightKey];
      els.stageBefore.src = row[leftKey] || placeholder(VERSION_LABELS[leftKey]);
      els.stageAfter.src = row[rightKey] || placeholder(VERSION_LABELS[rightKey]);
      els.stageBefore.onerror = () => { els.stageBefore.src = placeholder(VERSION_LABELS[leftKey]); };
      els.stageAfter.onerror = () => { els.stageAfter.src = placeholder(VERSION_LABELS[rightKey]); };
      els.stageLeftBadge.textContent = VERSION_LABELS[leftKey];
      els.stageRightBadge.textContent = VERSION_LABELS[rightKey];
      updateStageSplit(50);
      lucide.createIcons();
    }

    function closeModal() {
      els.modal.classList.remove('open');
      els.modal.setAttribute('aria-hidden', 'true');
      state.activeRowId = null;
      resetStageZoom();
    }

    function handleStageWheel(event) {
      event.preventDefault();
      const rect = els.stage.getBoundingClientRect();
      const anchorX = event.clientX - rect.left;
      const anchorY = event.clientY - rect.top;
      const delta = event.deltaY || 0;
      const factor = Math.exp(-delta * 0.0016);
      zoomAt(anchorX, anchorY, factor);
    }

    function zoomAt(anchorX, anchorY, factor) {
      const previousScale = state.zoom.scale;
      const nextScale = clamp(previousScale * factor, 1, state.zoom.max);
      if (Math.abs(nextScale - previousScale) < 0.001) return;

      const ratio = nextScale / previousScale;
      state.zoom.x = anchorX - (anchorX - state.zoom.x) * ratio;
      state.zoom.y = anchorY - (anchorY - state.zoom.y) * ratio;
      state.zoom.scale = nextScale;
      clampStagePan();
      applyStageZoom();
    }

    function startStagePan(event) {
      if (event.button !== 0) return;
      const rect = els.stage.getBoundingClientRect();
      const splitX = rect.width * (Number(els.stageRange.value) / 100);
      const localX = event.clientX - rect.left;
      const nearSplitHandle = Math.abs(localX - splitX) <= 34;

      event.preventDefault();
      if (state.zoom.scale <= 1 || nearSplitHandle) {
        state.zoom.splitDragging = true;
        updateStageSplitFromPointer(event.clientX);
        return;
      }

      state.zoom.dragging = true;
      state.zoom.dragStartX = event.clientX;
      state.zoom.dragStartY = event.clientY;
      state.zoom.startX = state.zoom.x;
      state.zoom.startY = state.zoom.y;
      els.stage.classList.add('dragging');
    }

    function moveStagePan(event) {
      if (state.zoom.splitDragging) {
        updateStageSplitFromPointer(event.clientX);
        return;
      }
      if (!state.zoom.dragging) return;
      state.zoom.x = state.zoom.startX + event.clientX - state.zoom.dragStartX;
      state.zoom.y = state.zoom.startY + event.clientY - state.zoom.dragStartY;
      clampStagePan();
      applyStageZoom();
    }

    function endStagePan() {
      if (state.zoom.splitDragging) {
        state.zoom.splitDragging = false;
        return;
      }
      if (!state.zoom.dragging) return;
      state.zoom.dragging = false;
      els.stage.classList.remove('dragging');
    }

    function updateStageSplitFromPointer(clientX) {
      const rect = els.stage.getBoundingClientRect();
      const percent = clamp((clientX - rect.left) / rect.width * 100, 0, 100);
      updateStageSplit(percent);
    }

    function updateStageSplit(percent) {
      const value = clamp(Number(percent) || 0, 0, 100);
      els.stageRange.value = value;
      els.stage.style.setProperty('--split', `${value}%`);
    }

    function clampStagePan() {
      if (state.zoom.scale <= 1) {
        state.zoom.scale = 1;
        state.zoom.x = 0;
        state.zoom.y = 0;
        return;
      }
      const rect = els.stage.getBoundingClientRect();
      const minX = rect.width * (1 - state.zoom.scale);
      const minY = rect.height * (1 - state.zoom.scale);
      state.zoom.x = clamp(state.zoom.x, minX, 0);
      state.zoom.y = clamp(state.zoom.y, minY, 0);
    }

    function applyStageZoom() {
      const scale = state.zoom.scale;
      els.stage.style.setProperty('--zoom-scale', scale.toFixed(4));
      els.stage.style.setProperty('--zoom-x', `${state.zoom.x.toFixed(2)}px`);
      els.stage.style.setProperty('--zoom-y', `${state.zoom.y.toFixed(2)}px`);
      els.stage.classList.toggle('zoomed', scale > 1.001);
    }

    function resetStageZoom() {
      state.zoom.scale = 1;
      state.zoom.x = 0;
      state.zoom.y = 0;
      state.zoom.dragging = false;
      state.zoom.splitDragging = false;
      els.stage.classList.remove('zoomed', 'dragging');
      applyStageZoom();
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function findRow(rowId) {
      return state.rows.find(row => row.id === rowId);
    }

    function getTotalPages(rows = filteredRows()) {
      return Math.max(1, Math.ceil(rows.length / state.pageSize));
    }

    function changePage(delta) {
      const totalPages = getTotalPages();
      state.page = Math.min(Math.max(state.page + delta, 1), totalPages);
      render();
      document.querySelector('.showcase-table')?.scrollTo({ top: 0, left: 0, behavior: 'instant' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updatePager(totalRows) {
      const totalPages = Math.max(1, Math.ceil(totalRows / state.pageSize));
      els.pager.style.display = totalRows > state.pageSize ? 'flex' : 'none';
      els.pageInfo.textContent = `第 ${state.page} / ${totalPages} 页`;
      els.prevPage.disabled = state.page <= 1;
      els.nextPage.disabled = state.page >= totalPages;
    }

    function fileNameFromUrl(url) {
      if (!url) return '';
      return String(url).split('/').pop().split('?')[0] || '';
    }

    function placeholder(label) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400"><rect width="640" height="400" fill="#e5e7eb"/><text x="320" y="208" font-family="Arial, Microsoft YaHei" font-size="32" text-anchor="middle" fill="#6b7280">${label}</text></svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[char]);
    }

    loadRows();
  </script>
</body>
</html>
